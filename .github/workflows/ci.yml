name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out sources and upstream
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Use Node.js 22
        uses: actions/setup-node@v7
        with:
          cache: npm
          node-version: 22

      - name: Install host target tools
        run: sudo apt-get update && sudo apt-get install -y g++ neko

      - name: Install npm dependencies
        run: npm ci

      - name: Install repository-local Haxe
        run: npm run setup

      - name: Run the complete quality surface
        run: npm run ci
